<html lang="zh-CN">
<head>

<style>
:root{--bg:#F5F3EF;--card:#FFF;--deep:#1B2A3A;--sun:#C0392B;--sunL:#E74C3C;--gold:#D4A017;--ocean:#2471A3;--gray:#95A5A6;--lgray:#ECF0F1;--text:#2C3E50;--t2:#7F8C8D;--bd:#D5D8DC;--r:10px;--rs:6px;--sh:0 2px 10px rgba(0,0,0,0.05);--f:"Microsoft YaHei","PingFang SC",sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--f);background:var(--bg);color:var(--text);line-height:1.6}
.top{background:linear-gradient(135deg,var(--deep),#2C3E50);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
.top h1{font-size:1.1rem}.top h1 span{color:var(--gold)}.top .tag{background:var(--sunL);padding:2px 8px;border-radius:8px;font-size:0.65rem}
.main{display:flex;min-height:calc(100vh-50px)}
.side{width:220px;background:var(--card);border-right:1px solid var(--bd);padding:8px 0;flex-shrink:0;overflow-y:auto;max-height:calc(100vh-50px)}
.side-tt{font-size:0.6rem;color:var(--gray);padding:6px 14px 3px;font-weight:700;letter-spacing:1px}
.side-it{padding:5px 14px 5px 20px;cursor:pointer;font-size:0.76rem;border-left:3px solid transparent;display:flex;justify-content:space-between;align-items:center;transition:all 0.15s}
.side-it:hover{background:var(--lgray)}.side-it.on{border-left-color:var(--sun);background:#FDF2F2;font-weight:700;color:var(--sun)}
.side-it .cnt{font-size:0.58rem;background:var(--sunL);color:#fff;padding:1px 5px;border-radius:6px}.side-it.on .cnt{background:var(--sun)}
.content{flex:1;padding:12px 18px;overflow-y:auto;max-height:calc(100vh-50px)}
.content h2{font-size:1.05rem;color:var(--deep);margin-bottom:2px}.content .sub{font-size:0.72rem;color:var(--t2);margin-bottom:6px}
.doc{background:linear-gradient(135deg,#F0F4F8,#E8F0FE);border-radius:var(--r);padding:12px 16px;margin-bottom:10px;border-left:4px solid var(--ocean);font-size:0.8rem;line-height:1.65}
.doc h4{color:var(--ocean);margin:6px 0 3px;font-size:0.85rem}.doc h4:first-child{margin-top:0}.doc p{margin:3px 0}.doc ul{margin:3px 0 3px 16px}.doc li{margin:1px 0;font-size:0.78rem}.doc strong{color:var(--sun)}
.tb{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.tb input,.tb select{padding:5px 10px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:0.78rem;font-family:var(--f);background:#fff}
.tb input:focus,.tb select:focus{outline:none;border-color:var(--gold)}.tb input{flex:1;min-width:130px}
.btn{padding:5px 12px;border:none;border-radius:var(--rs);cursor:pointer;font-size:0.76rem;font-weight:600;font-family:var(--f)}
.btn-p{background:var(--sun);color:#fff}.btn-p:hover{background:#A93226}
.btn-o{background:#fff;color:var(--sun);border:1.5px solid var(--sun)}.btn-o:hover{background:#FDF2F2}
.info{font-size:0.68rem;color:var(--t2);margin-bottom:5px}.info span{color:var(--sun);font-weight:700}
.tw{overflow-x:auto;border-radius:var(--r);box-shadow:var(--sh);background:#fff;max-height:36vh}
.tw table{width:100%;border-collapse:collapse;font-size:0.7rem}
.tw th{background:var(--deep);color:#fff;padding:5px 7px;text-align:left;font-weight:600;white-space:nowrap;position:sticky;top:0;cursor:pointer;font-size:0.68rem}
.tw th:hover{background:#2C3E50}.tw td{padding:4px 7px;border-bottom:1px solid var(--lgray);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tw tr:hover td{background:#FDF2F2}.tw tr:nth-child(even) td{background:#FAFAFA}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:10px;margin-top:8px}
.cc{background:var(--card);border-radius:var(--r);padding:10px;box-shadow:var(--sh);border:1px solid var(--bd)}
.cc h4{font-size:0.78rem;color:var(--deep);margin-bottom:3px}
.cd{width:100%;height:280px}
.cr{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-top:8px}
.crc{background:var(--card);border-radius:var(--r);padding:10px;text-align:center;border-left:4px solid var(--ocean);box-shadow:var(--sh)}
.crc.hl{border-left-color:var(--sun);background:#FDF2F2}.crc .nm{font-size:0.78rem;font-weight:700;color:var(--deep)}
.crc .mt{font-size:0.63rem;color:var(--t2);margin-top:3px}.crc .sc{font-size:0.82rem;font-weight:700;color:var(--sun)}
@media(max-width:768px){.main{flex-direction:column}.side{width:100%;max-height:none;display:flex;overflow-x:auto;padding:4px;border-right:none;border-bottom:1px solid var(--bd)}.side-it{white-space:nowrap;border-left:none;border-bottom:2px solid transparent;padding:4px 8px}.side-it.on{border-left:none;border-bottom-color:var(--sun)}.content{padding:8px}.cg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="top"><div><h1>🔬 <span>南澳紫菜</span> · 多模态风味特征数据库</h1><div style="font-size:0.62rem;opacity:0.6">Scientifically Queryable Flavor Identity for Nan'ao Traditional Sun-dried Laver</div></div><div style="display:flex;gap:6px"><span class="tag" id="tM">12模块</span><span class="tag" id="tR">225记录</span><span class="tag">v1.0</span></div></div>
<div class="main"><div class="side" id="sb"><div class="side-tt">L1·元数据</div><div class="side-it" data-sheet="L1_元数据" onclick="switchSheet('L1_元数据')">元数据 <span class="cnt">18</span></div><div class="side-tt">L2·原始数据</div><div class="side-it" data-sheet="L2_氨基酸" onclick="switchSheet('L2_氨基酸')">氨基酸 <span class="cnt">10</span></div><div class="side-it" data-sheet="L2_电子鼻" onclick="switchSheet('L2_电子鼻')">电子鼻 <span class="cnt">32</span></div><div class="side-it" data-sheet="L2_电子舌" onclick="switchSheet('L2_电子舌')">电子舌 <span class="cnt">13</span></div><div class="side-it" data-sheet="L2_感官评价" onclick="switchSheet('L2_感官评价')">感官评价 <span class="cnt">18</span></div><div class="side-it" data-sheet="L2_HS-SPME-GC-MS" onclick="switchSheet('L2_HS-SPME-GC-MS')">HS-SPME-GC-MS <span class="cnt">21</span></div><div class="side-it" data-sheet="L2_营养成分" onclick="switchSheet('L2_营养成分')">营养成分 <span class="cnt">15</span></div><div class="side-tt">L3·衍生指标</div><div class="side-it" data-sheet="L3_衍生指标" onclick="switchSheet('L3_衍生指标')">衍生指标 <span class="cnt">19</span></div><div class="side-tt">L4·模型级</div><div class="side-it" data-sheet="L4_特征化合物" onclick="switchSheet('L4_特征化合物')">特征化合物 <span class="cnt">24</span></div><div class="side-it" data-sheet="L4_预测方程" onclick="switchSheet('L4_预测方程')">预测方程 <span class="cnt">10</span></div><div class="side-tt">L5·综合报告</div><div class="side-it" data-sheet="L5_综合评价" onclick="switchSheet('L5_综合评价')">综合评价 <span class="cnt">23</span></div><div class="side-tt">其他</div><div class="side-it" data-sheet="数据库说明" onclick="switchSheet('数据库说明')">数据库说明 <span class="cnt">22</span></div></div><div class="content" id="ct"><div style="text-align:center;padding:80px 20px;color:var(--t2)"><div style="font-size:3rem">📊</div><p>请从左侧选择数据模块</p></div></div></div>
<script>
const D={DATA_JSON};
var DB=D.database,CH=D.charts,DC=D.docs||{{}},cs='',cd=[],cc=[],cf=null,sc=null,sa=true;
(function init(){{
  var first=Object.keys(DB).find(function(k){{return k.indexOf('L2_')===0}});
  if(first)switchSheet(first);
  var t=0;Object.values(DB).forEach(function(v){{t+=v.count}});
  document.getElementById('tM').textContent=Object.keys(DB).length+'模块';
  document.getElementById('tR').textContent=t+'记录';
}})();

function switchSheet(n){{cs=n;cd=DB[n].rows||[];cc=DB[n].columns||[];sc=null;sa=true;cf=null;document.querySelectorAll('.side-it').forEach(function(e){{e.classList.remove('on')}});document.querySelectorAll('.side-it').forEach(function(e){{if(e.textContent.indexOf(n.replace(/^L\d_/,''))>=0)e.classList.add('on')}});renderAll()}}
function renderAll(flt){{var d=flt||cd,ct=document.getElementById('ct'),dn=cs.replace('L1_','').replace('L2_','').replace('L3_','').replace('L4_','').replace('L5_','');if(cs==='L2_HS-SPME-GC-MS')dn='HS-SPME-GC-MS';var doc=DC[cs]||'',h='<h2>📊 '+dn+'</h2><div class="sub">'+cd.length+' 条记录 · '+cc.length+' 列</div>';if(doc)h+='<div class="doc">'+doc+'</div>';h+='<div class="tb"><select id="cfs" onchange="dof()"><option value="">按列筛选...</option>';cc.forEach(function(c){{h+='<option value="'+c.replace(/"/g,'&quot;')+'">'+c+'</option>'}});h+='</select><input type="text" id="cfv" placeholder="筛选值..." oninput="dof()"><button class="btn btn-p" onclick="dof()">🔍 查询</button><input type="text" id="sa" placeholder="🔍 全字段搜索..." oninput="dof()"><button class="btn btn-o" onclick="rf()">↺ 重置</button><span style="font-size:0.68rem;color:var(--t2);margin-left:auto" id="inf">显示 '+d.length+' / '+cd.length+' 条</span></div><div class="tw" id="ta"></div><div id="ca"></div>';ct.innerHTML=h;rt(d);rc()}}
function dof(){{var ck=document.getElementById('cfs').value,cv=(document.getElementById('cfv').value||'').toLowerCase(),st=(document.getElementById('sa').value||'').toLowerCase(),d=cd;if(ck&&cv)d=d.filter(function(r){{return String(r[ck]||'').toLowerCase().indexOf(cv)>=0}});if(st)d=d.filter(function(r){{return Object.values(r).some(function(v){{return String(v||'').toLowerCase().indexOf(st)>=0}})}});cf=d;document.getElementById('inf').textContent='显示 '+d.length+' / '+cd.length+' 条';rt(d)}}
function rf(){{document.getElementById('cfs').value='';document.getElementById('cfv').value='';document.getElementById('sa').value='';cf=null;document.getElementById('inf').textContent='显示 '+cd.length+' / '+cd.length+' 条';rt(cd)}}
function rt(d){{var h='<table><thead><tr>';cc.forEach(function(c){{h+='<th onclick="sb2(\''+c.replace(/'/g,"\\'")+'\')">'+c+'<span style="font-size:0.5rem">'+(sc===c?(sa?'▲':'▼'):'⇅')+'</span></th>'}});h+='</tr></thead><tbody>';if(!d.length)h+='<tr><td colspan="'+cc.length+'" style="text-align:center;color:var(--t2);padding:20px">无匹配数据</td></tr>';else d.forEach(function(r){{h+='<tr>';cc.forEach(function(c){{var v=r[c],x=(v===null||v===undefined||v==='')?'—':String(v);h+='<td title="'+x.replace(/"/g,'&quot;')+'">'+x+'</td>'}});h+='</tr>'}});h+='</tbody></table>';document.getElementById('ta').innerHTML=h}}
function sb2(c){{if(sc===c)sa=!sa;else{{sc=c;sa=true}}var d=cf||cd,sorted=d.slice().sort(function(a,b){{var va=a[c],vb=b[c];if(va===null||va===undefined)return 1;if(vb===null||vb===undefined)return-1;var na=Number(va),nb=Number(vb);if(!isNaN(na)&&!isNaN(nb))return sa?na-nb:nb-na;return sa?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va))}});if(cf)cf=sorted;else cf=sorted;rt(sorted)}}

function ic(id){{var d=document.getElementById(id);if(!d||typeof echarts==='undefined')return null;var c=echarts.getInstanceByDom(d);if(c)c.dispose();c=echarts.init(d);return c}}
function rc(){{var a=document.getElementById('ca');if(!a)return;if(typeof echarts==='undefined'){{a.innerHTML='<p style="text-align:center;color:var(--t2);padding:10px">📊 图表加载中...</p>';setTimeout(rc,500);return}}var nm=cs,CL=['#95A5A6','#E74C3C','#3498DB','#2ECC71'],GN=['湿样(南澳)','日晒(南澳)','红外(泉州)','红外(莱芜)'],h='';
if(nm.indexOf('电子鼻')>=0||nm.indexOf('电子舌')>=0||nm.indexOf('感官')>=0){{
h='<div class="cg"><div class="cc"><h4>👃 电子鼻14传感器雷达图</h4><div class="cd" id="cEn"></div></div><div class="cc"><h4>👅 电子舌9传感器雷达图</h4><div class="cd" id="cEt"></div></div><div class="cc"><h4>🧑‍🔬 感官风味剖面·南澳vs对照</h4><div class="cd" id="cSe"></div></div></div>';a.innerHTML=h;setTimeout(function(){{
var c1=ic('cEn');if(c1)c1.setOption({{tooltip:{{trigger:'item'}},legend:{{data:GN,bottom:0,textStyle:{{fontSize:9}}}},radar:{{indicator:CH.enose.sensors.map(function(s){{return{{name:s,max:2.5}}}}),center:['50%','46%'],radius:'58%',axisName:{{fontSize:7}}}},series:[{{type:'radar',data:GN.map(function(g,i){{return{{name:g,value:CH.enose.data[CH.enose.groups[i]]||[],lineStyle:{{color:CL[i]}},areaStyle:{{color:CL[i]+'15'}},itemStyle:{{color:CL[i]}},symbolSize:2}}}})}}]}});
var c2=ic('cEt');if(c2)c2.setOption({{tooltip:{{trigger:'item'}},legend:{{data:GN,bottom:0,textStyle:{{fontSize:9}}}},radar:{{indicator:CH.etongue.labels.map(function(a){{return{{name:a,max:15}}}}),center:['50%','46%'],radius:'58%',axisName:{{fontSize:7}}}},series:[{{type:'radar',data:GN.map(function(g,i){{return{{name:g,value:CH.etongue.data[CH.etongue.groups[i]]||[],lineStyle:{{color:CL[i]}},areaStyle:{{color:CL[i]+'15'}},itemStyle:{{color:CL[i]}},symbolSize:2}}}})}}]}});
var c3=ic('cSe');if(c3)c3.setOption({{tooltip:{{trigger:'item'}},legend:{{data:['南澳头水','对照'],bottom:0,textStyle:{{fontSize:9}}}},radar:{{indicator:CH.sensory.attrs.map(function(a){{return{{name:a,max:2.5}}}}),center:['50%','46%'],radius:'58%',axisName:{{fontSize:7}}}},series:[{{type:'radar',data:[{{name:'南澳头水',value:CH.sensory.sun,lineStyle:{{color:'#E74C3C'}},areaStyle:{{color:'#E74C3C15'}},itemStyle:{{color:'#E74C3C'}},symbolSize:4}},{{name:'对照',value:CH.sensory.ctrl,lineStyle:{{color:'#95A5A6',type:'dashed'}},areaStyle:{{color:'#95A5A615'}},itemStyle:{{color:'#95A5A6'}},symbolSize:4}}]}}]}});
}},150)}}
else if(nm.indexOf('GCMS')>=0||nm.indexOf('HS-SPME')>=0){{
h='<div class="cg"><div class="cc" style="grid-column:1/-1"><h4>🔬 HS-SPME-GC-MS 挥发性成分类别对比</h4><div class="cd" id="cGc"></div></div><div class="cc"><h4>🧪 关键风味化合物 日晒vs红外</h4><div class="cd" id="cGk"></div></div><div class="cc"><h4>🌀 日晒特征风味轮</h4><div class="cd" id="cFw"></div></div></div>';a.innerHTML=h;setTimeout(function(){{
var c1=ic('cGc');if(c1)c1.setOption({{tooltip:{{trigger:'axis'}},legend:{{data:GN,bottom:0,textStyle:{{fontSize:9}}}},xAxis:{{data:CH.gcms.cats,axisLabel:{{fontSize:9,rotate:15}}}},yAxis:{{name:'μg/kg'}},series:GN.map(function(g,i){{return{{name:g,type:'bar',data:CH.gcms.data[CH.enose.groups[i]]||[],itemStyle:{{color:CL[i],borderRadius:[3,3,0,0]}},barGap:'8%'}}}}),grid:{{left:60,right:10,top:15,bottom:40}}}});
var c2=ic('cGk');if(c2)c2.setOption({{tooltip:{{trigger:'axis'}},legend:{{data:['日晒南澳','红外均值'],bottom:0,textStyle:{{fontSize:9}}}},xAxis:{{data:CH.gcmsKey.map(function(d){{return d[0]}}),axisLabel:{{fontSize:8,rotate:20}}}},yAxis:{{name:'μg/kg'}},series:[{{name:'日晒南澳',type:'bar',data:CH.gcmsKey.map(function(d){{return d[1]}}),itemStyle:{{color:'#E74C3C',borderRadius:[3,3,0,0]}}}},{{name:'红外均值',type:'bar',data:CH.gcmsKey.map(function(d){{return d[2]}}),itemStyle:{{color:'#3498DB',borderRadius:[3,3,0,0]}}}}],grid:{{left:60,right:10,top:15,bottom:40}}}});
var c3=ic('cFw');if(c3&&CH.flavorWheel){{var fw=CH.flavorWheel,angles=fw.categories.map(function(_,i){{return i/fw.categories.length*Math.PI*2}});angles.push(angles[0]);var vals=fw.values.map(function(v){{return Math.abs(v)}});vals.push(vals[0]);var cls=fw.colors.concat([fw.colors[0]]);c3.setOption({{tooltip:{{trigger:'item'}},radar:{{indicator:fw.categories.map(function(name,i){{return{{name:name+'  ('+fw.compounds[i]+')',max:6}}}}),center:['50%','48%'],radius:'62%',axisName:{{fontSize:7}}}},series:[{{type:'radar',data:[{{value:fw.values.map(function(v){{return Math.abs(v)}}),name:'日晒特征风味',lineStyle:{{color:'#E74C3C'}},areaStyle:{{color:'#E74C3C20'}},itemStyle:{{color:function(p){{return fw.colors[p.dataIndex]}}}},symbolSize:function(v){{return Math.max(3,Math.abs(v)*3)}}}}]}}]}});
}},150)}}
else if(nm.indexOf('特征化合物')>=0){{
h='<div class="cg"><div class="cc" style="grid-column:1/-1"><h4>⭐ 日晒特征标志物富集倍率 (日晒÷红外)</h4><div class="cd" id="cFt"></div></div></div>';a.innerHTML=h;setTimeout(function(){{var c1=ic('cFt');if(!c1)return;var d=CH.features.filter(function(f){{return f.r<99}});c1.setOption({{tooltip:{{trigger:'axis',axisPointer:{{type:'shadow'}}}},xAxis:{{name:'富集倍率(×)'}},yAxis:{{type:'category',data:d.map(function(f){{return f.n+' ('+f.f+')'}}).reverse(),axisLabel:{{fontSize:9}}}},series:[{{type:'bar',data:d.map(function(f){{return{{value:f.r,itemStyle:{{color:f.r>3?'#E74C3C':f.r>1.5?'#F39C12':'#3498DB',borderRadius:[0,3,3,0]}}}}}}).reverse(),label:{{show:true,position:'right',formatter:'{{c}}×',fontSize:8,fontWeight:'bold'}},barMaxWidth:18}}],grid:{{left:160,right:45,top:10,bottom:20}}}});}},150)}}
else if(nm.indexOf('预测方程')>=0){{
h='<div class="cg"><div class="cc" style="grid-column:1/-1"><h4>📊 各感官属性预期预测精度 Q²</h4><div class="cd" id="cPq"></div></div></div>';a.innerHTML=h;setTimeout(function(){{var c1=ic('cPq');if(!c1)return;c1.setOption({{tooltip:{{trigger:'axis'}},xAxis:{{data:['腥味','光泽','鲜味','海苔香','苦味','甜味','回甘'],axisLabel:{{fontSize:10}}}},yAxis:{{name:'Q²',max:0.9}},series:[{{type:'bar',data:[0.70,0.60,0.60,0.55,0.55,0.50,0.50],itemStyle:{{color:function(p){{return p.value>0.65?'#E74C3C':p.value>0.55?'#F39C12':'#3498DB'}}}},label:{{show:true,position:'top',formatter:'{{c}}',fontWeight:'bold'}},barMaxWidth:40}}],grid:{{left:50,right:20,top:20,bottom:30}}}});}},150)}}
else if(nm.indexOf('综合评价')>=0){{
