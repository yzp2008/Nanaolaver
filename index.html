    h+='<p><strong>原理</strong>：偏最小二乘回归(PLSR)同时分解仪器变量矩阵和感官评分矩阵，提取最大化协方差的潜在变量，建立从<strong>"仪器数据"到"人的感知"</strong>的定量转化模型。变量后缀_Z表示经Z-score标准化。</p>';
    h+='<p><strong>预测情况</strong>：7组感官预测方程中，<strong style="color:#C0392B">腥味Q²>0.70</strong>(精度最高：信噪比高+含硫物与腥味"一因一果")，<strong>光泽/鲜味Q²>0.60</strong>，<strong style="color:#F39C12">回甘Q²>0.50</strong>(精度最低：时序复合感受)。</p>';
    h+='<p><strong>运用</strong>：①<strong>快速检测</strong>：3个仪器参数即可评估风味；②<strong>在线监控</strong>：嵌入干燥设备实时计算风味得分；③<strong>三级验证</strong>：7折CV→留一茬次→独立批次。</p>';
    h+='</div>';
  }
  h+='<div class="tb"><select id="cfs" onchange="doFilter()"><option value="">按列筛选...</option>';
  curCols.forEach(function(c){h+='<option value="'+c.replace(/"/g,'&quot;')+'">'+c+'</option>'});
  h+='</select><input type="text" id="cfv" placeholder="筛选值..." oninput="doFilter()"><button class="btn btn-p" onclick="doFilter()">🔍 查询</button><input type="text" id="sa" placeholder="🔍 全字段搜索..." oninput="doFilter()"><button class="btn btn-o" onclick="resetFilter()">↺ 重置</button><span style="font-size:0.68rem;color:var(--t2);margin-left:auto" id="inf">显示 '+curData.length+' 条</span></div><div class="tw" id="ta"></div><div id="ca"></div>';
  ct.innerHTML=h;
  renderTable(curData);
  renderCharts();
}

function doFilter(){
  var ck=document.getElementById('cfs').value,cv=(document.getElementById('cfv').value||'').toLowerCase(),st=(document.getElementById('sa').value||'').toLowerCase(),d=curData;
  if(ck&&cv)d=d.filter(function(r){return String(r[ck]||'').toLowerCase().indexOf(cv)>=0});
  if(st)d=d.filter(function(r){return Object.values(r).some(function(v){return String(v||'').toLowerCase().indexOf(st)>=0})});
  filtered=d;document.getElementById('inf').textContent='显示 '+d.length+' / '+curData.length+' 条';renderTable(d);
}
function resetFilter(){
  document.getElementById('cfs').value='';document.getElementById('cfv').value='';document.getElementById('sa').value='';filtered=null;
  document.getElementById('inf').textContent='显示 '+curData.length+' 条';renderTable(curData);
}
function renderTable(d){
  var h='<table><thead><tr>';
  curCols.forEach(function(c){h+='<th onclick="sortBy(&apos;'+c.replace(/'/g,"\\\\'")+'&apos;)">'+c+'<span style="font-size:0.5rem">'+(sortCol===c?(sortAsc?'▲':'▼'):'⇅')+'</span></th>'});
  h+='</tr></thead><tbody>';
  if(!d.length)h+='<tr><td colspan="'+curCols.length+'" style="text-align:center;color:var(--t2);padding:20px">无匹配数据</td></tr>';
  else d.forEach(function(r){
    h+='<tr>';
    curCols.forEach(function(c){
      var v=r[c],x=(v===null||v===undefined||v==='')?'—':String(v);
      var st='';
      if(curName=='L4_特征化合物'){
        var txt=String(r['化合物']||'')+String(r['日晒特征']||'')+String(r['风味描述']||'');
        if(txt.indexOf('仅日晒')>=0||txt.indexOf('签名')>=0||txt.indexOf('独有')>=0||txt.indexOf('★')>=0)
          st=' style="color:#C0392B;font-weight:700;background:#FFF5F5"';
      }
      h+='<td'+st+' title="'+x.replace(/"/g,'&quot;')+'">'+x+'</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table>';document.getElementById('ta').innerHTML=h;
}
function sortBy(c){
  if(sortCol===c)sortAsc=!sortAsc;else{sortCol=c;sortAsc=true;}
  var d=filtered||curData,sorted=d.slice().sort(function(a,b){var va=a[c],vb=b[c];if(va===null||va===undefined)return 1;if(vb===null||vb===undefined)return-1;var na=Number(va),nb=Number(vb);if(!isNaN(na)&&!isNaN(nb))return sortAsc?na-nb:nb-na;return sortAsc?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va))});
  if(filtered)filtered=sorted;else filtered=sorted;renderTable(sorted);
}

function ic(id){var d=document.getElementById(id);if(!d||typeof echarts==='undefined')return null;var c=echarts.getInstanceByDom(d);if(c)c.dispose();c=echarts.init(d);return c;}
function renderCharts(){
  var a=document.getElementById('ca');if(!a)return;if(typeof echarts==='undefined'){a.innerHTML='<p style="text-align:center;color:var(--t2);padding:10px">📊 图表加载中...</p>';setTimeout(renderCharts,500);return;}
  var nm=curName,CL=['#95A5A6','#E74C3C','#3498DB','#2ECC71'],GN=['湿样(南澳)','日晒(南澳)','红外(泉州)','红外(莱芜)'];
  var ed=null,hasEd=false;
  try{
    if(nm==='L2_电子鼻'){ed={sensors:['S2','S3','S4','S5','S6','S7','S8','S9','S10','S11','S12','S13','S14'],groups:GN};
    ed.data={};curData.forEach(function(r){var k=String(Object.values(r)[0]||'');if(k.indexOf('a-')===0)ed.data[GN[0]]=ed.sensors.map(function(s){return parseFloat(r['S'+s.replace('S','')])||1});});
    hasEd=true;}
    else if(nm==='L2_电子舌'){ed={labels:['酸味','咸味','涩味','后苦味','后涩味','鲜味','浓厚感','苦味','甜味'],groups:GN};
    ed.data={};var ek=['AAE(酸味)','CT0(咸味)','CA0(涩味)','GL1(后苦味)','C00(后涩味)','AE1(鲜味)','BT0(浓厚感)','HA0(苦味)','SW0(甜味)'];
    curData.forEach(function(r){var k=String(Object.values(r)[0]||'');var gk=k.split('-')[0];GN.forEach(function(gn,i){if(gn.indexOf(gk)===0)ed.data[gn]=ek.map(function(ekk){return parseFloat(r[ekk])||0});});});
    hasEd=true;}
  }catch(e){}

  if(nm.indexOf('HS-SPME')>=0||nm.indexOf('GCMS')>=0){
    a.innerHTML='<div class="charts"><div class="cc" style="grid-column:1/-1"><h4>🌀 日晒特征风味轮</h4><div class="cd" id="cFW"></div></div></div>';
    setTimeout(function(){
      var c=ic('cFW');if(!c)return;
      var cats=['烘烤/坚果香(吡嗪类)','花香/木香(降异戊二烯)','杏仁/坚果香(Strecker醛)','玫瑰/蜂蜜香(苯乙醛)','柑橘/油脂香(壬醛)','花香/柑橘香(芳樟醇)','麦芽/奶油香(签名化合物)','蘑菇/泥土↓(1-辛烯-3-醇)'];
      var vals=[4.3,3.9,1.6,2.4,1.3,1.2,5.0,3.1];
      var fcl=['#C0392B','#8E44AD','#D4A017','#E91E63','#27AE60','#8E44AD','#C0392B','#95A5A6'];
      c.setOption({tooltip:{trigger:'item'},radar:{indicator:cats.map(function(n){return{name:n,max:6}}),center:['50%','48%'],radius:'65%',axisName:{fontSize:7}},series:[{type:'radar',data:[{value:vals,name:'日晒特征风味',lineStyle:{color:'#C0392B',width:2},areaStyle:{color:'#E74C3C20'},itemStyle:{color:function(p){return fcl[p.dataIndex]}},symbolSize:function(v){return Math.max(3,Math.abs(v)*2.5)}}]}]});
    },150);
    return;
  }

  if(hasEd&&ed&&ed.sensors){
    a.innerHTML='<div class="charts"><div class="cc"><h4>雷达图</h4><div class="cd" id="cR"></div></div></div>';
    setTimeout(function(){
      var c=ic('cR');if(!c)return;
      var grpNames=ed.groups||GN;
      c.setOption({tooltip:{trigger:'item'},legend:{data:grpNames,bottom:0,textStyle:{fontSize:9}},radar:{indicator:ed.sensors.map(function(s){return{name:s,max:ed.sensors[0]==='S2'?2.5:15}}),center:['50%','48%'],radius:'60%',axisName:{fontSize:7}},series:[{type:'radar',data:grpNames.map(function(g,i){return{name:g,value:ed.data[g]||[],lineStyle:{color:CL[i]},areaStyle:{color:CL[i]+'15'},itemStyle:{color:CL[i]},symbolSize:2}})}]});
    },150);
  }else if(hasEd&&ed&&ed.labels){
    a.innerHTML='<div class="charts"><div class="cc"><h4>雷达图</h4><div class="cd" id="cR"></div></div></div>';
    setTimeout(function(){
      var c=ic('cR');if(!c)return;
      c.setOption({tooltip:{trigger:'item'},legend:{data:GN,bottom:0,textStyle:{fontSize:9}},radar:{indicator:ed.labels.map(function(a){return{name:a,max:15}}),center:['50%','48%'],radius:'60%',axisName:{fontSize:7}},series:[{type:'radar',data:GN.map(function(g,i){return{name:g,value:ed.data[g]||[],lineStyle:{color:CL[i]},areaStyle:{color:CL[i]+'15'},itemStyle:{color:CL[i]},symbolSize:2}})}]});
    },150);
  }
}
window.addEventListener('resize',function(){document.querySelectorAll('.cd').forEach(function(d){var c=echarts.getInstanceByDom(d);if(c)c.resize()});});

</script>
</body>
</html>
